# Auto Sync My Copy
name: Auto Sync My Copy
on:
  workflow_run:
    workflows: ["Update xiaosa"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy and commit
        run: |
          cp jsm.json qzh.json 2>/dev/null || true
          git config user.name "auto-sync"
          git config user.email "auto-sync@github.com"
          git add qzh.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto sync qzh.json $(date +%Y-%m-%d)"
          git push
      - name: Init qzh.json if missing
        if: failure()
        run: |
          touch qzh.json
          git add qzh.json
          git commit -m "init qzh.json" || true
          git push
